name: Convert Changed PDFs to HTML

on:
  push:
    paths:
      - "**/doc.pdf"

permissions:
  contents: write

jobs:
  convert-changed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make pdfstruct executable
        run: chmod +x tools/pdfstruct-linux-x86_64/pdfstruct

      - name: Convert changed PDFs
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          python scripts/convert_pdfs_to_html.py --changed --base-ref "$BEFORE" --head-ref "$AFTER"

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: convert changed act PDFs to HTML"
            git push
          else
            echo "No HTML changes detected."
          fi
