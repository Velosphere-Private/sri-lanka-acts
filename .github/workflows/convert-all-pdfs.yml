name: Convert All PDFs to HTML

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make pdfstruct executable
        run: chmod +x tools/pdfstruct-linux-x86_64/pdfstruct

      - name: Convert all PDFs
        run: python scripts/convert_pdfs_to_html.py --all

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: convert all act PDFs to HTML"
            git push
          else
            echo "No HTML changes detected."
          fi
